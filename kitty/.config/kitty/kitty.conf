font_family      Iosevka NF Bold Italic
bold_font        auto
italic_font      auto
font_size        14.0

# Use zsh as default shell
shell /bin/zsh

# --- Window appearance ---
window_padding_width 6
hide_window_decorations yes
background_opacity 1.0

# --- Behavior ---
scrollback_lines 10000
enable_audio_bell no
confirm_os_window_close 0

# --- Tabs ---
tab_bar_edge top
tab_bar_style powerline
active_tab_font_style bold
inactive_tab_font_style normal

# --- Keyboard shortcuts ---
map ctrl+shift+t new_tab
map ctrl+shift+w close_tab
map ctrl+shift+right next_tab
map ctrl+shift+left previous_tab
map f11 toggle_fullscreen
map shift+f11 toggle_maximized

# --- Clipboard ---
map ctrl+shift+v paste_from_clipboard
map ctrl+shift+c copy_to_clipboard

# --- Splits ---
map ctrl+shift+h launch --location=hsplit
map ctrl+shift+enter launch --location=vsplit

# --- Mouse ---
copy_on_select yes

# Colors (Black on White theme)

# Foreground / Background
foreground #000000
background #ffffff

# Cursor (optional defaults)
cursor #888888
cursor_text_color #ffffff

cursor_blink_interval 0.5
cursor_stop_blinking_after 0

# Selection colors (reasonable defaults)
selection_foreground #ffffff
selection_background #000000

# ANSI Colors

# Black
color0  #000000
color8  #686868

# Red
color1  #b21818
color9  #ff5454

# Green
color2  #18b218
color10 #54ff54

# Yellow
color3  #b26818
color11 #d4b743

# Blue
color4  #1818b2
color12 #5454ff

# Magenta
color5  #b218b2
color13 #ff54ff

# Cyan
color6  #18b2b2
color14 #54ffff

# White / Gray
color7  #b2b2b2
color15 #ffffff

# Faint colors (approximation)
# Kitty doesn’t support separate faint palette directly,
# but we approximate via dim_opacity
dim_opacity 0.75

# Scrollbar (Konsole had it on the right)
scrollback_lines 10000
scrollbar_width 8

# Appearance tweaks
background_opacity 1.0
enable_audio_bell no

# Rendering
allow_bold true
draw_minimal_borders yes
