# --- PREFIX ---
unbind C-b
set-option -g prefix C-a
bind C-a send-prefix
bind C-a last-window
bind -n C-\\ last-window


# --- GENERAL SETTINGS ---
set -sg escape-time 0
set -g history-limit 10000
set -g mouse on
set -g mode-keys vi
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# --- SPLITS ---
unbind %
unbind '"'
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# --- NAVIGATION ---
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# --- COPY MODE ---
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -sel clip -i"

# --- STATUS BAR (TOP, CENTERED, GRAYSCALE) ---
set -g status-position top
set -g status-justify centre
set -g status-style bg=colour252,fg=colour232

# Left: session name + prefix indicator + battery
set -g status-left "#[fg=colour232,bg=colour252]  #S #{prefix_highlight} "
set -g status-left-length 40

# Right: battery + time
set -g status-right "#{battery_icon} #{battery_percentage} #[fg=colour232,bg=colour252]  %H:%M "
set -g status-right-length 60

# Window list format (unfocused tabs dimmed)
set -g window-status-format "#[fg=colour240,bg=colour252] #I:#W "
set -g window-status-current-format "#[fg=colour232,bg=colour250,bold] #I:#W "

# --- PANE BORDERS ---
set -g pane-border-style fg=colour238
set -g pane-active-border-style fg=colour245

# --- PLUGIN SETTINGS ---

# tmux-prefix-highlight (minimal style with icons)
set -g @prefix_highlight_fg 'colour252'
set -g @prefix_highlight_bg 'colour240'
set -g @prefix_highlight_show_copy_mode 'on'
set -g @prefix_highlight_copy_mode_attr 'fg=colour252,bg=colour240'
set -g @prefix_highlight_prefix_prompt '󰌌'
set -g @prefix_highlight_copy_prompt ''

# tmux-battery (nerd font icons)
set -g @batt_icon_charge_tier8 '󰁻'
set -g @batt_icon_charge_tier7 '󰁼'
set -g @batt_icon_charge_tier6 '󰁽'
set -g @batt_icon_charge_tier5 '󰁾'
set -g @batt_icon_charge_tier4 '󰁿'
set -g @batt_icon_charge_tier3 '󰂀'
set -g @batt_icon_charge_tier2 '󰂁'
set -g @batt_icon_charge_tier1 '󰂂'
set -g @batt_icon_status_charged '󰁹'
set -g @batt_icon_status_charging '󰂄'
set -g @batt_icon_status_discharging '󰂃'

# tmux-fzf (trigger with prefix + F)
TMUX_FZF_LAUNCH_KEY="F"

# tmux-yank (works automatically, no config needed)

# tmux-open (works automatically in copy mode)
# Press 'o' in copy mode to open selection
# Press 'Ctrl-o' to open in $EDITOR
EDITOR=/usr/bin/nvim

# --- PLUGINS ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-open'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'tmux-plugins/tmux-battery'
# set -g @plugin 'tmux-plugins/tmux-prefix-highlight'

# --- RELOAD CONFIG ---
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# --- MISC ---
set -g set-titles on
set -g set-titles-string "#T"

# Initialize TPM (keep this at the very bottom)
run '~/.tmux/plugins/tpm/tpm'
